# Data loader configuration
data:
  data_dir: "./data/raw" #Directory path for raw data
  test_queries_path: "./data/test_queries.json" #Path to test queries file

# Data processor configuration
data_processor:
  enable_cleaning: true #Enable text cleaning (remove noise)
  enable_summary: true #Generate chunk summaries
  enable_keywords: true #Extract chunk keywords

# Text chunking configuration
chunk:
  chunk_size: "512"  #Maximum characters per chunk
  chunk_overlap: "100"  #Character overlap between chunks

# Caching for scanned PDFs
cache:
  enabled: true
  cache_dir: "./data/cache" #Cache directory path

# Embedding model configuration
embedder:
  model_name: "text-embedding-3-small" #Embedding model name
  model_dimensions: "1536" #Embedding vector dimensions

# Vector database configuration
vector_store:
  persist_directory: "./data/vector_store" #Vector database persistence directory
  collection_name: "code_study" #Vector database collection name
  distance_metric: "cosine" #Distance metric for similarity calculation

# Hybrid retrieval configuration
retriever:
  strategy: "hybrid" #Retrieval strategy: bm25, semantic, hybrid
  bm25:
    enabled: true
    top_k: 20 #Number of results from BM25 retrieval
  semantic:
    enabled: true
    top_k: 20 #Number of results from semantic retrieval
  hybrid:
    alpha: 0.15 #BM25 weight (0-1), semantic weight is (1-alpha). Smaller alpha favors semantic search
    top_k: 10 #Final number of results

# Cross-encoder reranking configuration
reranker:
  enabled: true #Enable reranking
  model_name: "cross-encoder/ms-marco-MiniLM-L-12-v2" #Cross-encoder model for English text (lightweight and efficient)
  top_k: 5 #Final number of results after reranking

